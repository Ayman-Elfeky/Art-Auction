# Usage: copy .env.example to .env, edit secrets, then from this directory:
#   docker compose up --build
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-artauctiondb}
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ./src
      dockerfile: API/Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PUBLISH_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-artauctiondb};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      Jwt__Key: ${JWT_KEY:-ArtAuction-Development-Secret-Key-Change-Me-123456}
      Jwt__Issuer: ${JWT_ISSUER:-ArtAuction}
      Jwt__Audience: ${JWT_AUDIENCE:-ArtAuctionClients}
      Jwt__ExpiresMinutes: ${JWT_EXPIRES_MINUTES:-120}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
